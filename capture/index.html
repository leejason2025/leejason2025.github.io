<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capture Mobile Helmet</title>
<style>
  html, body { margin: 0; background: #080808; font-family: monospace; color: #8ecae6; }
  #controls { position: fixed; top: 0.75rem; left: 0.75rem; z-index: 10; font-size: 11px; letter-spacing: 0.05em; line-height: 1.5; }
  #controls label { display: inline-block; min-width: 88px; }
  #controls input { font: 11px monospace; width: 80px; background: #0d1217; color: #ffb703; border: 1px solid #219ebc; padding: 2px 6px; }
  #controls button { font: 11px monospace; padding: 6px 14px; background: #0d1217; color: #ffb703; border: 1px solid #219ebc; cursor: pointer; margin-top: 0.5rem; letter-spacing: 0.1em; }
  #controls button:hover { background: #101620; }
  #stage { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #ascii-canvas { display: block; border: 1px solid #219ebc33; }
  .hint { opacity: 0.6; }
</style>
</head>
<body>
  <div id="controls">
    <div class="hint">CAPTURE · mobile helmet</div>
    <div>
      <label>rot Y:</label><input id="rotY" type="number" step="0.05" value="-0.4">
      <label>cam Z:</label><input id="camZ" type="number" step="0.2" value="7.4">
    </div>
    <div>
      <label>width:</label><input id="w" type="number" step="50" value="1200">
      <label>height:</label><input id="h" type="number" step="50" value="1800">
    </div>
    <button id="render">Render</button>
    <button id="download">Download PNG</button>
  </div>

  <div id="stage">
    <canvas id="ascii-canvas"></canvas>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  const PALETTE = [
    [ 33, 158, 188],
    [142, 202, 230],
    [255, 183,   3],
    [251, 133,   0],
  ];
  const RAMP   = '.:-=+*#%@';
  const CELL_W = 8, CELL_H = 13, FONT_PX = 12;

  let scene, camera, renderer, target, model;
  let asciiCanvas, asciiCtx, pixelBuffer;
  const inner = new THREE.Group();
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.add(inner);

  // lights — same as main site
  scene.add(new THREE.AmbientLight(0x8899aa, 1.2));
  scene.add(new THREE.HemisphereLight(0x8ecae6, 0x023047, 1.0));
  const key  = new THREE.DirectionalLight(0xffffff, 3.5);
  key.position.set(3, 4, 5); scene.add(key);
  const rim  = new THREE.DirectionalLight(0xffb703, 2.5);
  rim.position.set(-4, 0, -2); scene.add(rim);
  const fill = new THREE.DirectionalLight(0x219ebc, 1.2);
  fill.position.set(2, -3, 2); scene.add(fill);

  asciiCanvas = document.getElementById('ascii-canvas');
  asciiCtx    = asciiCanvas.getContext('2d');

  const glCanvas = document.createElement('canvas');
  renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: false });
  renderer.setPixelRatio(1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  function loadModel() {
    return new Promise((resolve, reject) => {
      const loader = new GLTFLoader();
      const draco  = new DRACOLoader();
      draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
      loader.setDRACOLoader(draco);
      loader.load('../helmet.glb', gltf => {
        model = gltf.scene;
        const box  = new THREE.Box3().setFromObject(model);
        const ctr  = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const scale = 4.2 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);
        model.position.set(-ctr.x * scale, -ctr.y * scale, -ctr.z * scale);
        model.traverse(o => { if (o.isMesh) o.material = new THREE.MeshStandardMaterial({
          color: 0x9aa3ad, metalness: 0.55, roughness: 0.42, emissive: 0x161a1f,
        }); });
        inner.add(model);
        resolve();
      }, undefined, reject);
    });
  }

  function render() {
    const OUT_W = +document.getElementById('w').value;
    const OUT_H = +document.getElementById('h').value;
    const ROT_Y = +document.getElementById('rotY').value;
    const CAM_Z = +document.getElementById('camZ').value;
    const gridCols = Math.floor(OUT_W / CELL_W);
    const gridRows = Math.floor(OUT_H / CELL_H);

    if (!camera) {
      camera = new THREE.PerspectiveCamera(38, OUT_W / OUT_H, 0.1, 200);
    }
    camera.aspect = OUT_W / OUT_H;
    camera.position.set(0, 0, CAM_Z);
    camera.updateProjectionMatrix();

    inner.rotation.set(0, ROT_Y, 0);

    renderer.setSize(gridCols, gridRows);
    if (target) target.dispose();
    target = new THREE.WebGLRenderTarget(gridCols, gridRows, {
      minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
      type: THREE.UnsignedByteType,
    });
    renderer.setRenderTarget(target);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    pixelBuffer = new Uint8Array(gridCols * gridRows * 4);
    renderer.readRenderTargetPixels(target, 0, 0, gridCols, gridRows, pixelBuffer);

    asciiCanvas.width  = OUT_W;
    asciiCanvas.height = OUT_H;
    asciiCanvas.style.width  = (OUT_W / 2) + 'px';
    asciiCanvas.style.height = (OUT_H / 2) + 'px';
    asciiCtx.setTransform(1, 0, 0, 1, 0, 0);
    asciiCtx.fillStyle = '#080808';
    asciiCtx.fillRect(0, 0, OUT_W, OUT_H);
    asciiCtx.font = `bold ${FONT_PX}px "Courier New", Courier, monospace`;
    asciiCtx.textAlign = 'center';
    asciiCtx.textBaseline = 'middle';

    for (let r = 0; r < gridRows; r++) {
      const py = gridRows - 1 - r;
      for (let c = 0; c < gridCols; c++) {
        const i = (py * gridCols + c) * 4;
        const R = pixelBuffer[i], G = pixelBuffer[i + 1], B = pixelBuffer[i + 2];
        const lum = 0.299 * R + 0.587 * G + 0.114 * B;
        if (lum < 18) continue;
        const norm = Math.pow(lum / 255, 0.55);
        const charIdx = Math.min(RAMP.length - 1, Math.floor(norm * RAMP.length));
        const pIdx    = Math.min(PALETTE.length - 1, Math.floor(norm * PALETTE.length));
        const [pr, pg, pb] = PALETTE[pIdx];
        asciiCtx.fillStyle = `rgb(${pr},${pg},${pb})`;
        asciiCtx.fillText(RAMP[charIdx], c * CELL_W + CELL_W / 2, r * CELL_H + CELL_H / 2);
      }
    }
  }

  document.getElementById('render').addEventListener('click', render);
  document.getElementById('download').addEventListener('click', () => {
    asciiCanvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'helmet-static.png';
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
    }, 'image/png');
  });

  await loadModel();
  render();
  </script>
</body>
</html>
